name: FE CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CODEDEPLOY_APP: ${{ secrets.CODEDEPLOY_APP }}
  CODEDEPLOY_GROUP: ${{ secrets.CODEDEPLOY_GROUP }}
  SERVICE_PORT: ${{ secrets.SERVICE_PORT }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  ECR_REPO_URI: ${{ secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: cd-prod-fe
      cancel-in-progress: false

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Prepare tags
        id: prep
        run: |
          FULL_SHA="${{ github.sha }}"
          SHORT_SHA="${FULL_SHA:0:7}"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "IMAGE_SHA_TAG=sha-$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsECRPush
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin ${{ env.ECR_REPO_URI }}

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            -t "${{ env.ECR_REPO_URI }}:${{ steps.prep.outputs.IMAGE_SHA_TAG }}" \
            -f Dockerfile .

      - name: Push image to ECR
        run: |
          docker tag "${{ env.ECR_REPO_URI }}:${{ steps.prep.outputs.IMAGE_SHA_TAG }}" "${{ env.ECR_REPO_URI }}:prod"
          docker push "${{ env.ECR_REPO_URI }}:${{ steps.prep.outputs.IMAGE_SHA_TAG }}"
          docker push "${{ env.ECR_REPO_URI }}:prod"

      - name: Validate deployment files
        run: |
          if [ ! -f appspec.yml ]; then
            echo "appspec.yml 파일이 없습니다."
            exit 1
          fi

          if ! compgen -G "scripts/*.sh" > /dev/null; then
            echo "scripts 디렉토리에 .sh 파일이 없습니다."
            exit 1
          fi

      - name: Build deployment bundle
        run: |
          mkdir -p bundle/scripts
          cp appspec.yml bundle/
          cp scripts/*.sh bundle/scripts/
          chmod +x bundle/scripts/*.sh

          echo "${{ secrets.PROD_ENV_FILE }}" > bundle/.env
          echo "APP_IMAGE=${{ env.ECR_REPO_URI }}:${{ steps.prep.outputs.IMAGE_SHA_TAG }}" >> bundle/.env
          echo "SERVICE_PORT=${{ env.SERVICE_PORT }}" >> bundle/.env
          echo "AWS_REGION=${{ env.AWS_REGION }}" >> bundle/.env

          ZIP_NAME="fe-prod-${{ steps.prep.outputs.SHORT_SHA }}.zip"

          cd bundle
          zip -r "../$ZIP_NAME" .
          cd ..
          
          aws s3 cp "$ZIP_NAME" "s3://${{ env.S3_BUCKET }}/fe/prod/fe-${{ steps.prep.outputs.SHORT_SHA }}.zip"

      - name: Trigger CodeDeploy deployment
        id: create_deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${{ env.CODEDEPLOY_APP }}" \
            --deployment-group-name "${{ env.CODEDEPLOY_GROUP }}" \
            --s3-location bucket=${{ env.S3_BUCKET }},key=fe/prod/fe-${{ steps.prep.outputs.SHORT_SHA}}.zip,bundleType=zip \
            --description "fe prod in-place ${{ github.sha }}" \
            --query 'deploymentId' \
            --output text)

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "None" ]; then
            echo "Deployment ID를 가져오지 못했습니다."
            echo "Failed to get deployment ID."
            exit 1
          fi
          echo "Deployment started with ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Wait for deployment completion
        id: wait_deploy
        continue-on-error: true
        run: |
          echo "Waiting for deployment ${{ steps.create_deployment.outputs.DEPLOYMENT_ID }} to complete..."
          aws deploy wait deployment-successful \
          --deployment-id "${{ steps.create_deployment.outputs.DEPLOYMENT_ID }}"
          echo "Deployment ${{ steps.create_deployment.outputs.DEPLOYMENT_ID }} completed successfully."

      - name: Show deployment failure details
        if: steps.wait_deploy.outcome == 'failure'
        run: |
          DEPLOYMENT_ID="${{ steps.create_deployment.outputs.DEPLOYMENT_ID }}"

          echo "Deployment failed. Fetching deployment details..."
          aws deploy get-deployment \
            --deployment-id "$DEPLOYMENT_ID" \
            --output json

          echo "Fetching deployment target details..."
          TARGET_IDS=$(aws deploy list-deployment-targets \
            --deployment-id "$DEPLOYMENT_ID" \
            --query 'targetIds' \
            --output text)

          for TARGET_ID in $TARGET_IDS; do
            echo "===== Target: $TARGET_ID ====="
            aws deploy get-deployment-target \
              --deployment-id "$DEPLOYMENT_ID" \
              --target-id "$TARGET_ID" \
              --output json
          done

          exit 1