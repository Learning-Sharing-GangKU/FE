name: FE CI Pipeline

on:
  pull_request:
    branches: [dev, main]

jobs:
  fe-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # - name: Lint
      #   run: npm run lint

